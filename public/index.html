<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-5 shadow-sm custom-navbar">
        <div class="container d-flex justify-content-center">
            <span class="navbar-brand mb-0 h1 fw-bold tracking-wide">Task Manager</span>
        </div>
    </nav>

    <main class="container" style="max-width: 600px;">
        <div class="card shadow-sm mb-4 minimalist-card">
            <div class="card-body p-4">
                <form id="taskForm" class="d-flex gap-3">
                    <input type="text" id="taskInput" class="form-control custom-input" placeholder="What needs to be done?" required>
                    <button type="submit" class="btn btn-custom px-4 fw-semibold">Add</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm minimalist-card">
            <ul id="taskList" class="list-group list-group-flush rounded-3">
                </ul>
        </div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
